<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>TR Bulk Calculator</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: radial-gradient(circle at top, #1b1b1b, #0a0a0a);
    color: white;
}

/* 🧊 Glass Card */
.card {
    width: 360px;
    padding: 22px;
    border-radius: 18px;
    background: rgba(255,255,255,0.06);
    backdrop-filter: blur(18px);
    -webkit-backdrop-filter: blur(18px);
    border: 1px solid rgba(255,255,255,0.08);
    box-shadow: 0 10px 40px rgba(0,0,0,0.6);
    text-align: center;
}

/* Title */
h2 {
    margin-bottom: 12px;
    font-weight: 600;
    letter-spacing: 0.3px;
}

/* Input */
input {
    width: 100%;
    padding: 12px;
    margin-top: 12px;
    border-radius: 12px;
    border: 1px solid rgba(255,255,255,0.12);
    background: rgba(0,0,0,0.35);
    color: white;
    font-size: 14px;
    box-sizing: border-box;
    transition: 0.2s;
}

input:focus {
    outline: none;
    border-color: rgba(76,175,80,0.6);
    box-shadow: 0 0 10px rgba(76,175,80,0.2);
}

/* =========================
   SEGMENTED BUTTONS (ANIMATED)
========================= */
.modeWrapper {
    position: relative;
    display: flex;
    margin-top: 12px;
    border-radius: 12px;
    background: rgba(255,255,255,0.08);
    padding: 4px;
    overflow: hidden;
}

/* Sliding background */
.slider {
    position: absolute;
    top: 4px;
    left: 4px;
    width: 50%;
    height: calc(100% - 8px);
    border-radius: 10px;
    background: rgba(76,175,80,0.9);
    transition: 0.35s ease;
    z-index: 0;
}

/* Buttons */
.modeBtn {
    flex: 1;
    padding: 10px;
    border: none;
    background: transparent;
    color: white;
    font-weight: bold;
    cursor: pointer;
    z-index: 1;
    transition: 0.2s;
}

.modeBtn:hover {
    opacity: 0.8;
}

/* Primary button */
.primary {
    width: 100%;
    margin-top: 12px;
    padding: 12px;
    border-radius: 12px;
    border: none;
    cursor: pointer;
    font-weight: bold;
    background: linear-gradient(135deg, #4CAF50, #3fa046);
    box-shadow: 0 6px 20px rgba(76,175,80,0.25);
    transition: 0.2s;
}

.primary:hover {
    transform: translateY(-1px);
    box-shadow: 0 10px 25px rgba(76,175,80,0.35);
}

/* Output */
.output {
    margin-top: 15px;
    font-size: 14px;
    line-height: 1.6;
    text-align: left;
    background: rgba(0,0,0,0.25);
    padding: 12px;
    border-radius: 12px;
    border: 1px solid rgba(255,255,255,0.06);
    animation: fadeIn 0.25s ease;
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(4px); }
    to { opacity: 1; transform: translateY(0); }
}

.label { opacity: 0.7; font-size: 12px; }

/* Pricing box */
.tierBox {
    margin-top: 12px;
    padding: 12px;
    border-radius: 12px;
    background: rgba(0,0,0,0.25);
    border: 1px solid rgba(255,255,255,0.08);
    text-align: left;
    font-size: 13px;
    line-height: 1.5;
}

.tierBox h3 {
    margin: 0 0 8px 0;
    font-size: 14px;
    opacity: 0.8;
}
</style>
</head>

<body>

<div class="card">
    <h2 id="modeTitle">Training Receipts → Price</h2>

    <!-- 🔥 Animated Toggle -->
    <div class="modeWrapper">
        <div class="slider" id="slider"></div>
        <button class="modeBtn" onclick="setMode('TR')">Training Receipts</button>
        <button class="modeBtn" onclick="setMode('MONEY')">Money</button>
    </div>

    <input id="inputField" placeholder="Enter TR (e.g. 100k, 100,000, 1m)">

    <button class="primary" onclick="calculate()">Calculate</button>

    <div class="output" id="output"></div>

    <div class="tierBox">
        <h3>Pricing Tiers</h3>
        <div>100k – 199k → <b>$0.60 / 1k</b></div>
        <div>200k+ → <b>$0.50 / 1k + 25% bonus</b></div>
    </div>
</div>

<script>
let mode = "TR";

/* 🎯 Animated slider */
function updateSlider() {
    const slider = document.getElementById("slider");
    slider.style.transform = (mode === "TR") ? "translateX(0%)" : "translateX(100%)";
}

function setMode(m) {
    mode = m;

    document.getElementById("output").innerHTML = "";
    document.getElementById("inputField").value = "";

    if (mode === "TR") {
        document.getElementById("modeTitle").innerText = "Training Receipts → Price";
        document.getElementById("inputField").placeholder = "Enter TR (e.g. 100k, 100,000, 1m)";
    } else {
        document.getElementById("modeTitle").innerText = "Money → TR";
        document.getElementById("inputField").placeholder = "Enter Money (e.g. 77, 100)";
    }

    updateSlider();
}

function parseInput(val) {
    val = val.toLowerCase().replace(/,/g, "").trim();

    if (val.endsWith("k")) return parseFloat(val) * 1000;
    if (val.endsWith("m")) return parseFloat(val) * 1000000;

    return parseFloat(val);
}

function format(num) {
    return num.toLocaleString();
}

function calculate() {
    let val = document.getElementById("inputField").value;
    let output = document.getElementById("output");

    if (!val) return output.innerHTML = "Enter a value.";

    if (mode === "TR") {
        let x = parseInput(val);

        let base = x;
        let bonus = 0;
        let purchased = x;

        if (x >= 200000) {
            purchased = x / 1.25;
            bonus = x - purchased;
        }

        let price;

        if (x < 10000) price = (x/1000)*2;
        else if (x < 100000) price = (x/1000)*0.70;
        else if (x < 200000) price = (x/1000)*0.60;
        else price = (purchased/1000)*0.50;

        output.innerHTML = `
            <div><span class="label">Base TR:</span> ${format(Math.floor(purchased))}</div>
            <div><span class="label">Bonus TR:</span> ${format(Math.floor(bonus))}</div>
            <div><span class="label">Total TR:</span> ${format(Math.floor(base))}</div>
            <hr style="border:0;border-top:1px solid rgba(255,255,255,0.1);margin:10px 0;">
            <div><b>Price:</b> $${price.toFixed(2)}</div>
        `;
    } else {
        let m = parseFloat(val.replace(/,/g, ""));

        let base = (m / 0.50) * 1000;
        let bonus = 0;
        let total = base;

        if (base >= 200000) {
            bonus = base * 0.25;
            total = base + bonus;
        }

        output.innerHTML = `
            <div><span class="label">Base TR:</span> ${format(Math.floor(base))}</div>
            <div><span class="label">Bonus TR:</span> ${format(Math.floor(bonus))}</div>
            <div><span class="label">Total TR:</span> ${format(Math.floor(total))}</div>
        `;
    }
}

/* init */
updateSlider();
</script>

</body>
</html>
